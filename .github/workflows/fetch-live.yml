name: Refresh live market data

# Runs scripts/fetch_live.py from GitHub's servers (no browser CORS) and commits
# the resulting docs/data/live.json back to main. The frontend just reads that
# file, so the Live Data tab becomes instant and reliable.
#
# Schedule: every 30 min between 13:00 and 21:00 UTC Mon-Fri, which covers the
# US market session in both EST (08:00-16:00 ET) and EDT (09:00-17:00 ET).

on:
  schedule:
    - cron: '*/30 13-21 * * 1-5'
  workflow_dispatch: {}      # manual "Run workflow" button
  push:
    branches: [main]
    paths:
      - '.github/workflows/fetch-live.yml'
      - 'scripts/fetch_live.py'

permissions:
  contents: write            # required to commit back to the repo

concurrency:
  group: fetch-live
  cancel-in-progress: false  # let an in-flight run finish

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch live data
        run: |
          python scripts/fetch_live.py docs/data/live.json docs/data/history.json

      - name: Commit if changed
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain docs/data/live.json)" ]]; then
            echo "No changes to live.json — skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/live.json
          git commit -m "chore: refresh live.json [skip ci]"
          git push
