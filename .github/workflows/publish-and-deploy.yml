name: Publish Artifacts And Deploy

on:
  workflow_dispatch:
    inputs:
      provider:
        description: AI provider to use for brief generation
        required: true
        default: anthropic
        type: choice
        options:
          - anthropic
          - openai
      model:
        description: Optional model override
        required: false
        default: ""
        type: string
      skip_brief:
        description: Refresh market data only
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  publish-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand --watchman=false

      - name: Publish site artifacts
        env:
          MACRO_BRIEF_PROVIDER: ${{ inputs.provider }}
          MACRO_BRIEF_MODEL: ${{ inputs.model }}
          MACRO_BRIEF_SKIP_BRIEF: ${{ inputs.skip_brief && '1' || '0' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run publish:site

      - name: Commit updated published artifacts
        run: |
          if git diff --quiet -- docs; then
            echo "No published artifact changes."
            exit 0
          fi
          git config user.name "macro-brief-bot"
          git config user.email "macro-brief-bot@users.noreply.github.com"
          git add docs
          git commit -m "chore: publish site artifacts"
          git push

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
