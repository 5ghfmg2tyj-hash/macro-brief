name: Publish Artifacts And Deploy

on:
  workflow_dispatch:
    inputs:
      provider:
        description: AI provider to use for brief generation
        required: true
        default: anthropic
        type: choice
        options:
          - anthropic
          - openai
      model:
        description: Optional model override
        required: false
        default: ""
        type: string
      skip_brief:
        description: Refresh market data only
        required: true
        default: false
        type: boolean
  schedule:
    # Weekdays at 6:15 PM America/Chicago during daylight time.
    - cron: "15 23 * * 1-5"
    # Mondays at 6:30 PM America/Chicago during daylight time.
    - cron: "30 23 * * 1"

concurrency:
  group: publish-and-deploy-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand --watchman=false

      - name: Publish site artifacts
        env:
          MACRO_BRIEF_PROVIDER: ${{ github.event_name == 'workflow_dispatch' && inputs.provider || 'anthropic' }}
          MACRO_BRIEF_MODEL: ${{ github.event_name == 'workflow_dispatch' && inputs.model || '' }}
          MACRO_BRIEF_SKIP_BRIEF: ${{ github.event_name == 'schedule' && github.event.schedule == '15 23 * * 1-5' && '1' || (github.event_name == 'workflow_dispatch' && inputs.skip_brief && '1' || '0') }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run publish:site

      - name: Commit updated published artifacts
        run: |
          if git diff --quiet -- docs; then
            echo "No published artifact changes."
            exit 0
          fi
          git config user.name "macro-brief-bot"
          git config user.email "macro-brief-bot@users.noreply.github.com"
          git add docs
          git commit -m "chore: publish site artifacts"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
